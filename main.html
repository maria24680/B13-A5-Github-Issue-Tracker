<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
<!-- links -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
<link rel="stylesheet" href="./style.css">
<!-- font & font-awesome -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quattrocento+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Tiro+Bangla:ital@0;1&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="geist bg-[#F8FAFC]">
    <header>
<!-- navbar -->
    <div class="navbar flex-col gap-5 md:flex-row bg-base-100 shadow-sm px-4 bg-white">
    <div class="flex-1 flex items-center gap-2">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10">
      <h1 class="md:text-2xl text-xl font-bold">GitHub Issues Tracker</h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative">
        <input id="input_issue" type="search" placeholder="Search issues"
               class="input input-bordered pl-10 pr-4 w-64 rounded-lg" />
        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 opacity-50 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="11" cy="11" r="8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 21l-4.3-4.3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn bg-primary text-white whitespace-nowrap">
          New Issue <i class="fa-solid fa-plus ml-1"></i>
        </label>

      </div>
    </div>
  </div>
</header>

<main class="max-w-11/12 m-auto">
<!-- buttons -->

<div class="my-20 bg-white p-5 shadow-lg m-auto ">
<button id="all_btn" onclick="indicator('all_btn')" class="btn px-6 py-3 font-normal bg-primary text-white">All</button>
<button id="open_btn" onclick="indicator('open_btn')" class="btn px-6 py-3 font-normal text-black bg-white">Open</button>
<button id="close_btn" onclick="indicator('close_btn')" class="btn px-6 py-3 font-normal text-black bg-white">Closed</button>
</div>

<!-- issues heading -->
 <div class="mt-20 bg-white p-5 flex-col md:flex-row  shadow-lg m-auto flex items-start md:items-center justify-between gap-5 rounded-lg">
  <div class="w-13 h-13 rounded-full bg-[#ECE4FF] flex items-center justify-center">
    <img src="./assets/Aperture.png" alt="" class="w-6 h-6">
  </div>

  <div id="display_number" class="flex-1">
  
  </div>

  <div class="flex gap-2 items-center">
    <i class="fa-solid fa-circle text-green-400 text-sm"></i>
    <span>Open</span>
  </div>

  <div class="flex gap-2 items-center">
    <i class="fa-solid fa-circle text-[#A855F7] text-sm"></i>
    <span>Closed</span>
  </div>
</div>
<!-- loader -->
<div id="spin" class="flex items-center justify-center my-5">
<progress class="progress w-1/2 text-primary"></progress>

</div>
<!-- issue_card -->

<div id="card_sec" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-5">
    
 <!-- card_from js -->
  </div>

<!-- Open the modal using ID.showModal() method -->

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
        <div id="modal_info">

         </div>
    <div  class="modal-action">
      <form method="dialog">
      <button class="btn btn-primary outline-0">Close</button>
      </form>
    </div>
  </div>
</dialog>


</main>






    <script src="./script.js"></script>
</body>
</html>
