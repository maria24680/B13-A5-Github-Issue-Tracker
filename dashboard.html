<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Issues Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
        body { background-color: #F8F9FA; font-family: 'Inter', sans-serif; }
    </style>

</head>

<body class="bg-gray-100">

<!-- Navbar -->

<nav class="flex justify-between items-center px-8 py-4 bg-white shadow">

<div class="flex items-center gap-2">
<img src="./assets/github-logo.png" class="w-8" alt="logo">
<h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-3">

<input id="searchInput" class="border rounded-lg px-4 py-2" placeholder="Search issues...">
<button onclick="searchIssues()" class="bg-purple-600 text-white px-4 py-2 rounded">New Issue</button>

</div>

</nav>

<!-- Tabs + Issue Count -->

<div class="max-w-6xl mx-auto mt-6">

<div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">

<div class="flex gap-3">

<button onclick="setTab('all')"
id="tabAll"
class="tab-btn bg-purple-600 text-white px-5 py-2 rounded">All</button>

<button onclick="setTab('open')"
id="tabOpen"
class="tab-btn bg-gray-200 px-5 py-2 rounded">Open</button>

<button onclick="setTab('closed')"
id="tabClosed"
class="tab-btn bg-gray-200 px-5 py-2 rounded">Closed</button>
</div>
</div>
</div>

<div class="max-w-6xl mx-auto mt-6">
    <div>
<span id="issueCount" class="text-sm text-gray-500">0 Issues</span>
</div>
</div>

<!-- Loader -->

<div id="loader" class="hidden flex justify-center mt-10">
<div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600"></div>
</div>

<!-- Cards -->

<div id="issueContainer" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6">
</div>

<!-- Modal -->

<div id="issueModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
<div id="modalContent" class="bg-white w-[450px] rounded-lg p-6 shadow-lg"></div>
</div>

<script src="script.js"></script>
</body>
</html>
