<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
        body { background-color: #F8F9FA; font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white w-[420px] p-8 rounded-lg shadow">

<div class="flex justify-center mb-4">
<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-16" alt="GitHub Logo">
</div>

<h1 class="text-center text-2xl font-bold">
GitHub Issues Tracker
</h1>

<p class="text-center text-gray-500 mb-6">
Sign in to manage your issues
</p>

<label class="block mb-1 font-medium">Username</label>
<input id="username" type="text"
placeholder="Enter Username"
class="w-full border p-3 rounded-md mb-1">
<p class="text-blue-600 text-sm mb-4">Default: admin</p>

<label class="block mb-1 font-medium">Password</label>
<input id="password" type="password"
placeholder="Enter Password"
class="w-full border p-3 rounded-md mb-1">
<p class="text-blue-600 text-sm mb-5">Default: admin123</p>

<button onclick="login()"
class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-md font-semibold">
Sign In
</button>

<div class="flex items-center my-6">
<div class="flex-1 h-px bg-gray-300"></div>
<span class="px-3 text-gray-400 text-sm">OR</span>
<div class="flex-1 h-px bg-gray-300"></div>
</div>

<div class="bg-gray-100 p-4 rounded text-center text-sm">
<p class="text-gray-500 mb-2">Demo Credentials:</p>
<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
