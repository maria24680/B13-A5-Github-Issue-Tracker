<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-200">
        <div class="text-center mb-6">
            <img src="./assets/github-logo.png" alt="GitHub" class="w-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md font-semibold hover:bg-indigo-700 transition">Sign In</button>
        </form>

        <div class="mt-8 text-center border-t pt-4">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-4">OR</p>
            <div class="bg-gray-50 p-4 rounded text-sm text-gray-600">
                <p>Demo Credentials:</p>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
